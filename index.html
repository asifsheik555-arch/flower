<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enchanted Garden Animation</title>
  <style>
    /* --- Base Styling --- */
    body {
      background-color: #0d131a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .enchanted-garden {
      position: relative;
      width: 500px;
      height: 450px;
      border: 1px solid #1a2530;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      background: radial-gradient(circle at center bottom, #11202e 0%, #0d131a 70%);
    }

    /* --- Shared Flower Parts --- */
    .flower-group {
      position: absolute;
      bottom: 0;
      display: flex;
      justify-content: center;
    }

    .stem {
      position: absolute;
      bottom: 0;
      width: 5px;
      height: 0px; /* Starts hidden */
      background: linear-gradient(to top, #024b42, #299e8c);
      border-radius: 10px 10px 0 0;
      transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 10px rgba(41, 158, 140, 0.4);
    }

    .leaf {
      position: absolute;
      width: 35px;
      height: 35px;
      background: linear-gradient(45deg, #024b42, #299e8c);
      opacity: 0.9;
      transform: scale(0); 
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .leaf-left {
      border-radius: 0 100% 0 100%;
      transform-origin: bottom right;
    }

    .leaf-right {
      border-radius: 100% 0 100% 0;
      transform-origin: bottom left;
    }

    .flower-head {
      position: absolute;
      transform: scale(0);
      transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .petal {
      position: absolute;
      width: 22px;
      height: 45px;
      background: #cbfcf1;
      border-radius: 50% 50% 20% 20%;
      box-shadow: 0 0 15px #4db8ff, inset 0 0 10px #4db8ff;
      transform-origin: bottom center;
    }

    .p1 { transform: rotate(-45deg) translateY(-8px); }
    .p2 { transform: rotate(0deg) translateY(-12px); z-index: 2; }
    .p3 { transform: rotate(45deg) translateY(-8px); }

    .center {
      width: 12px;
      height: 12px;
      background: #fffca8;
      border-radius: 50%;
      position: absolute;
      z-index: 3;
      box-shadow: 0 0 20px 6px rgba(255, 252, 168, 0.9);
    }

    /* Throbbing glow for the main flower */
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 15px 5px rgba(255, 252, 168, 0.7); }
      50% { box-shadow: 0 0 25px 10px rgba(255, 252, 168, 1); }
    }

    /* --- Positioning the Bouquet --- */

    /* Center Flower */
    .center-flower { left: 50%; }
    .center-flower .leaf-left { bottom: 70px; left: -32px; }
    .center-flower .leaf-right { bottom: 120px; left: 2px; }
    .center-flower .flower-head { bottom: 215px; }

    /* Left Flower */
    .left-flower { left: 35%; }
    .left-flower .stem { transform: rotate(-10deg); transform-origin: bottom; }
    .left-flower .leaf-left { bottom: 50px; left: -30px; }
    .left-flower .flower-head { bottom: 145px; left: -25px; transform-origin: bottom; }

    /* Right Flower */
    .right-flower { left: 65%; }
    .right-flower .stem { transform: rotate(10deg); transform-origin: bottom; }
    .right-flower .leaf-right { bottom: 60px; left: 5px; }
    .right-flower .flower-head { bottom: 155px; left: 25px; transform-origin: bottom; }

    /* --- Grass/Ferns --- */
    .grass {
      position: absolute;
      bottom: 0;
      width: 40px;
      height: 0px;
      border-left: 3px solid #024b42;
      border-radius: 100% 0 0 0;
      transition: height 1s ease-in-out;
      opacity: 0.6;
    }
    .g1 { left: 20%; transform: scaleX(-1); }
    .g2 { left: 25%; }
    .g3 { left: 75%; }
    .g4 { left: 80%; transform: scaleX(-1); }

    /* --- THE ANIMATION SEQUENCE (On Hover) --- */

    /* 1. Grass grows immediately */
    .enchanted-garden:hover .g1 { height: 120px; transition-delay: 0s; }
    .enchanted-garden:hover .g2 { height: 80px; transition-delay: 0.2s; }
    .enchanted-garden:hover .g3 { height: 100px; transition-delay: 0.1s; }
    .enchanted-garden:hover .g4 { height: 140px; transition-delay: 0.3s; }

    /* 2. Center Flower blooms first */
    .enchanted-garden:hover .center-flower .stem { height: 230px; transition-delay: 0.2s; }
    .enchanted-garden:hover .center-flower .leaf-left { transform: scale(1) rotate(-20deg); transition-delay: 0.6s; }
    .enchanted-garden:hover .center-flower .leaf-right { transform: scale(1) rotate(20deg); transition-delay: 0.8s; }
    .enchanted-garden:hover .center-flower .flower-head { transform: scale(1); transition-delay: 1.2s; }
    .enchanted-garden:hover .center-flower .pulse { animation: glowPulse 2s infinite ease-in-out 2s; }

    /* 3. Left & Right Flowers follow shortly after */
    .enchanted-garden:hover .left-flower .stem { height: 160px; transition-delay: 0.6s; }
    .enchanted-garden:hover .left-flower .leaf-left { transform: scale(1) rotate(-15deg); transition-delay: 1.1s; }
    .enchanted-garden:hover .left-flower .flower-head { transform: scale(0.8) rotate(-15deg); transition-delay: 1.5s; }

    .enchanted-garden:hover .right-flower .stem { height: 170px; transition-delay: 0.8s; }
    .enchanted-garden:hover .right-flower .leaf-right { transform: scale(1) rotate(15deg); transition-delay: 1.3s; }
    .enchanted-garden:hover .right-flower .flower-head { transform: scale(0.8) rotate(15deg); transition-delay: 1.7s; }

    /* --- Magical Fireflies --- */
    .firefly {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fffca8;
      border-radius: 50%;
      box-shadow: 0 0 10px 2px #fffca8;
      opacity: 0;
    }

    .enchanted-garden:hover .f1 { animation: float 3s ease-in-out 1.2s infinite; left: 30%; bottom: 180px; }
    .enchanted-garden:hover .f2 { animation: float 4s ease-in-out 1.5s infinite; left: 70%; bottom: 200px; }
    .enchanted-garden:hover .f3 { animation: float 3.5s ease-in-out 2s infinite; left: 50%; bottom: 280px; }
    .enchanted-garden:hover .f4 { animation: float 2.5s ease-in-out 1.8s infinite; left: 20%; bottom: 100px; }
    .enchanted-garden:hover .f5 { animation: float 4.5s ease-in-out 2.2s infinite; left: 80%; bottom: 150px; }

    @keyframes float {
      0% { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
      50% { opacity: 1; transform: translateY(-30px) translateX(20px) scale(1); }
      100% { transform: translateY(-60px) translateX(-10px) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="enchanted-garden">
    <!-- Magical Fireflies -->
    <div class="firefly f1"></div>
    <div class="firefly f2"></div>
    <div class="firefly f3"></div>
    <div class="firefly f4"></div>
    <div class="firefly f5"></div>

    <!-- Decorative Grass -->
    <div class="grass g1"></div>
    <div class="grass g2"></div>
    <div class="grass g3"></div>
    <div class="grass g4"></div>

    <!-- Left Flower -->
    <div class="flower-group left-flower">
      <div class="stem"></div>
      <div class="leaf leaf-left"></div>
      <div class="flower-head">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="center"></div>
      </div>
    </div>

    <!-- Right Flower -->
    <div class="flower-group right-flower">
      <div class="stem"></div>
      <div class="leaf leaf-right"></div>
      <div class="flower-head">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="center"></div>
      </div>
    </div>

    <!-- Center Flower -->
    <div class="flower-group center-flower">
      <div class="stem"></div>
      <div class="leaf leaf-left"></div>
      <div class="leaf leaf-right"></div>
      <div class="flower-head">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="center pulse"></div>
      </div>
    </div>
  </div>

</body>
</html>
